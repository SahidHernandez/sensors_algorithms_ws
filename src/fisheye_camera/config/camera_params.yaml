# ==============================================================================
# Fisheye Camera Configuration - V4L2 Driver
# ==============================================================================
# This configuration file defines the hardware interface and image processing 
# parameters for the fisheye camera via the V4L2 driver.
# ==============================================================================

v4l2_camera_node:
  ros__parameters:
    # Physical device path to the V4L2 video node.
    video_device: "/dev/v4l/by-id/usb-HD_USB_Camera_HD_USB_Camera-video-index0"
    
    # Target image resolution in pixels.
    image_width: 640
    image_height: 480
    
    # Capture framerate in frames per second (FPS).
    framerate: 15.0
    
    # Raw pixel format from the camera hardware.
    # Note: YUYV is preferred over MJPG due to driver compatibility 
    # limitations in the current node version.
    pixel_format: "YUYV"
    
    # Format of the image published to ROS. 
    # Conversion occurs on the CPU; this is a necessary overhead.
    output_encoding: "rgb8"
    
    # TF frame ID for the camera's optical frame.
    camera_frame_id: "fisheye_camera_link"
    
    # Path to the camera calibration file (YAML). 
    # Leave empty if using default or not calibrated.
    camera_info_url: ""