namespace: yolo
model_type: YOLO
model: yolov8n.pt
tracker: bytetrack.yaml
device: cpu
fuse_model: false
yolo_encoding: bgr8
enable: true
threshold: 0.5
iou: 0.7
imgsz_height: 480
imgsz_width: 640
half: false
max_det: 300
augment: false
agnostic_nms: false
retina_masks: false
input_image_topic: /camera/color/image_raw
image_reliability: 1
input_depth_topic: /camera/depth/image_raw
depth_image_reliability: 1
input_depth_info_topic: /camera/depth/camera_info
depth_info_reliability: 1
target_frame: base_link
depth_image_units_divisor: 1000
use_tracking: true
use_3d: false
use_debug: true
